services:
  - type: web
    name: avipro-backend
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn avipro.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DB_NAME
        fromDatabase:
          name: avipro_db
          property: database
      - key: DB_USER
        fromDatabase:
          name: avipro_db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: avipro_db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: avipro_db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: avipro_db
          property: port

databases:
  - name: avipro_db
    databaseName: avipro_db
    user: avipro_user
    plan: free